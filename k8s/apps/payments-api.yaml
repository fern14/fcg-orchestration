apiVersion: v1
kind: ConfigMap
metadata:
  name: payments-api-config
  namespace: fcg
data:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: http://+:8080
  RabbitMq__Host: rabbitmq
  RabbitMq__Port: "5672"
  RabbitMq__User: fcg
  Jwt__Issuer: fcg-users-api
  Jwt__Audience: fcg-client
---
apiVersion: v1
kind: Secret
metadata:
  name: payments-api-secret
  namespace: fcg
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: Server=payments-db,1433;Database=paymentsdb;User Id=sa;Password=Fcg@12345;TrustServerCertificate=True
  RabbitMq__Password: fcg123
  Jwt__Key: change-this-local-development-key-with-many-characters
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: fcg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      containers:
        - name: payments-api
          image: fcg-payments-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: payments-api-config
            - secretRef:
                name: payments-api-secret
---
apiVersion: v1
kind: Service
metadata:
  name: payments-api
  namespace: fcg
spec:
  selector:
    app: payments-api
  ports:
    - port: 80
      targetPort: 8080
