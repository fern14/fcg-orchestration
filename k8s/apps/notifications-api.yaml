apiVersion: v1
kind: ConfigMap
metadata:
  name: notifications-api-config
  namespace: fcg
data:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: http://+:8080
  RabbitMq__Host: rabbitmq
  RabbitMq__Port: "5672"
  RabbitMq__User: fcg
---
apiVersion: v1
kind: Secret
metadata:
  name: notifications-api-secret
  namespace: fcg
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: Server=notifications-db,1433;Database=notificationsdb;User Id=sa;Password=Fcg@12345;TrustServerCertificate=True
  RabbitMq__Password: fcg123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-api
  namespace: fcg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications-api
  template:
    metadata:
      labels:
        app: notifications-api
    spec:
      containers:
        - name: notifications-api
          image: fcg-notifications-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: notifications-api-config
            - secretRef:
                name: notifications-api-secret
---
apiVersion: v1
kind: Service
metadata:
  name: notifications-api
  namespace: fcg
spec:
  selector:
    app: notifications-api
  ports:
    - port: 80
      targetPort: 8080
